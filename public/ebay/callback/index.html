<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CardOps AI eBay Callback</title>
    <style>
      :root {
        color: #17202a;
        background: #f7f9fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        color: #526173;
        line-height: 1.55;
      }
      .status {
        border-radius: 6px;
        border: 1px solid #dce3ea;
        background: #f8fafc;
        padding: 12px;
        margin-top: 16px;
      }
      .ok {
        border-color: #99d8c8;
        background: #ecfdf7;
      }
      .warn {
        border-color: #f3cd78;
        background: #fff8e5;
      }
      .fail {
        border-color: #f3a6a6;
        background: #fff1f1;
      }
      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid #0f766e;
        background: #0f766e;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        margin-top: 12px;
        cursor: pointer;
      }
      code {
        background: #eef2f6;
        border-radius: 4px;
        padding: 2px 4px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CardOps AI eBay Callback</h1>
      <p>
        This page received the eBay authorization response. It will now open the local
        CardOps callback so the desktop app can exchange the code and store the connection.
      </p>
      <div id="status" class="status">Opening local CardOps callback...</div>
      <a id="manualLink" class="button" href="#" hidden>Open local CardOps callback</a>
    </main>
    <script>
      (function () {
        const status = document.getElementById("status");
        const manualLink = document.getElementById("manualLink");
        const query = window.location.search || "";
        const params = new URLSearchParams(query);
        const code = params.get("code");
        const error = params.get("error");
        params.set("browser", "1");
        const localUrl = "http://127.0.0.1:8000/ebay/callback?" + params.toString();

        function setStatus(kind, html) {
          status.className = "status " + kind;
          status.innerHTML = html;
        }

        manualLink.href = localUrl;

        if (error) {
          setStatus(
            "warn",
            "eBay returned an authorization error. Opening local CardOps so it can record the declined callback."
          );
        } else if (!code) {
          setStatus("fail", "Missing OAuth code. This URL does not contain an eBay authorization code.");
          return;
        }

        manualLink.hidden = false;
        setStatus(
          "ok",
          "Opening <code>127.0.0.1:8000</code>. If the browser does not move automatically, click the button below."
        );
        window.setTimeout(function () {
          window.location.replace(localUrl);
        }, 250);
      })();
    </script>
  </body>
</html>
