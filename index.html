<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CardOps AI OAuth</title>
    <style>
      :root {
        color: #17202a;
        background: #f7f9fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(680px, 100%);
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        color: #526173;
        line-height: 1.55;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }
      a {
        color: #0f766e;
        font-weight: 700;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        background: #eef2f6;
        border-radius: 4px;
        padding: 2px 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CardOps AI OAuth</h1>
      <p>
        This free GitHub Pages site hosts the CardOps AI eBay OAuth callback.
        Use <code>/ebay/callback/</code> as the eBay Auth Accepted and Auth Declined URL.
      </p>
      <nav aria-label="CardOps eBay support pages">
        <a href="/cardops/ebay/about/">About</a>
        <a href="/cardops/ebay/privacy_&_TOS/">Privacy &amp; Terms</a>
        <a href="/cardops/ebay/callback/">Callback</a>
      </nav>
    </main>
  </body>
</html>
