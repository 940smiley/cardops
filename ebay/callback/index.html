<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CardOps AI eBay Callback</title>
    <style>
      :root {
        color: #17202a;
        background: #f7f9fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        color: #526173;
        line-height: 1.55;
      }
      .status {
        border-radius: 6px;
        border: 1px solid #dce3ea;
        background: #f8fafc;
        padding: 12px;
        margin-top: 16px;
      }
      .ok {
        border-color: #99d8c8;
        background: #ecfdf7;
      }
      .warn {
        border-color: #f3cd78;
        background: #fff8e5;
      }
      .fail {
        border-color: #f3a6a6;
        background: #fff1f1;
      }
      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid #0f766e;
        background: #0f766e;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        margin-top: 12px;
        cursor: pointer;
      }
      code {
        background: #eef2f6;
        border-radius: 4px;
        padding: 2px 4px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CardOps AI eBay Callback</h1>
      <p>
        This page received the eBay authorization response. If CardOps AI is running locally,
        it will forward the callback to <code>127.0.0.1</code> and CardOps will record redacted
        OAuth evidence in the local audit log.
      </p>
      <div id="status" class="status">Processing callback...</div>
      <a id="manualLink" class="button" href="#" hidden>Open local CardOps callback</a>
    </main>
    <script>
      (function () {
        const status = document.getElementById("status");
        const manualLink = document.getElementById("manualLink");
        const query = window.location.search || "";
        const params = new URLSearchParams(query);
        const code = params.get("code");
        const error = params.get("error");
        const localUrl = "http://127.0.0.1:8000/ebay/callback" + query;

        function setStatus(kind, html) {
          status.className = "status " + kind;
          status.innerHTML = html;
        }

        manualLink.href = localUrl;

        if (error) {
          setStatus(
            "warn",
            "eBay returned an authorization error. CardOps will record the declined callback if the local API is running."
          );
        } else if (!code) {
          setStatus("fail", "Missing OAuth code. This URL does not contain an eBay authorization code.");
          return;
        }

        fetch(localUrl, {
          method: "GET",
          mode: "cors",
          cache: "no-store",
          credentials: "omit"
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Local CardOps API returned HTTP " + response.status);
            }
            return response.json();
          })
          .then(function () {
            setStatus("ok", "Callback forwarded to local CardOps AI. You can close this page.");
          })
          .catch(function (err) {
            manualLink.hidden = false;
            setStatus(
              "warn",
              "CardOps AI is not reachable at <code>127.0.0.1:8000</code>. Start CardOps locally, then click the button below. Detail: " +
                err.message
            );
          });
      })();
    </script>
  </body>
</html>
